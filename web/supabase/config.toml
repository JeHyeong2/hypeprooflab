# HypeProof Lab — Supabase local stack config
# Used by `supabase start` (Docker required).
#
# Production credentials live in Vercel env vars; this file is ONLY for local
# integration tests. Keys generated by the local stack are deterministic
# across machines (see .env.test.example) and are safe to commit.
#
# Run from web/:
#   supabase start         # bring up Postgres + auth + storage + studio
#   supabase status        # show URLs and keys (always the same locally)
#   supabase db reset      # nuke and re-apply migrations/*.sql
#   supabase stop          # tear down

project_id = "hypeproof-web"

# ── REST + GraphQL ─────────────────────────────────────────────
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ── Postgres ───────────────────────────────────────────────────
[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = false           # we run our own seed via `npm run db:seed`

# ── Studio (web UI) ────────────────────────────────────────────
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# ── Inbucket (email testing) ───────────────────────────────────
[inbucket]
enabled = true
port = 54324

# ── Storage ────────────────────────────────────────────────────
[storage]
enabled = true
file_size_limit = "50MiB"

# ── Auth ───────────────────────────────────────────────────────
[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_confirmations = false   # local: no email confirm required

# ── Realtime ───────────────────────────────────────────────────
[realtime]
enabled = true

# ── Functions ──────────────────────────────────────────────────
[functions]
[functions.serve]
enabled = false
