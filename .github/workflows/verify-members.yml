name: Verify Members in Build

on:
  push:
    branches: [main]
    paths:
      - 'data/members.json'
      - 'web/src/lib/members.ts'
      - 'web/src/app/dashboard/**'
      - 'web/src/app/creators/**'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Verify all members in build output
        run: bash scripts/verify-members.sh --create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
