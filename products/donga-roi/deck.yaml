name: donga-roi
title: "Future AI Leader's Academy — 사업계획서"
spec: SPEC.md
theme: navy-coral
font: "Noto Sans KR"
output_format: pptx

audience:
  profile: "동아일보 전략기획실 임원 (50대, 미디어 업계)"
  viewing: "프로젝터 3m 거리 / 모니터 1m"
  concerns:
    - "AI 교육이 동아일보 브랜드에 맞는가?"
    - "투자 대비 수익이 현실적인가? 초기 비용은?"
    - "경쟁사가 이미 하고 있지 않은가?"
    - "우리 조직이 운영할 역량이 있는가?"
    - "실패했을 때 브랜드 리스크는?"
  questions:
    - "왜 지금? 타이밍의 근거는?"
    - "매출이 언제부터? BEP는?"
    - "파일럿 규모와 비용은?"
    - "레퍼런스 사례가 있는가?"
    - "동아일보만의 차별점은?"
  success_criteria:
    - "Year 1 파일럿 → Year 2 확장 단계적 로드맵"
    - "초기 투자 50M 이하로 검증 가능"
    - "동아일보 브랜드 강화에 기여"
    - "기존 자산(독자 DB, 콘텐츠 IP) 활용 시너지"

narrative_structure: scqa

text_limits:
  action_title: 40
  subtitle: 30
  stat_label: 10
  bullet: 20
  table_cell: 14
  source: 60

slides_module: null
output_dir: output/
slide_count_target: 12

layout_rules:
  max_same_layout_pct: 30
  max_consecutive_same: 2

quality_gate:
  min_critic_score: 7
  max_warns: 3

images:
  logo: "https://hypeproof-ai.xyz/logos/logo-h-light-lg.png"
  team:
    - url: "https://hypeproof-ai.xyz/members/jay.png"
      name: "Jay Lee"
      title: "AI/ML Engineer, Program Director"
    - url: "https://hypeproof-ai.xyz/members/ryan.png"
      name: "Ryan Kim"
      title: "CERN Physics Ph.D, Quant Researcher"
    - url: "https://hypeproof-ai.xyz/members/jy.png"
      name: "JY Shin"
      title: "AI/ML Engineer, Curriculum Lead"
  education:
    - "https://hypeproof-ai.xyz/workshop/edu.png"
    - "https://hypeproof-ai.xyz/workshop/banner.png"
    - "https://hypeproof-ai.xyz/workshop/kid-coding.png"
