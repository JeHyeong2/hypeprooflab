cases:

  - case_id: C01
    name: "동아미디어센터 자체 정기 워크숍 (Direct B2C)"
    priority: 1
    context:
      venue: "동아미디어센터 내 교육장 (서울 종로구) — 기존 시설 활용"
      participants: "초등 4~6학년 + 학부모 1:1 팀, 15~20팀/회"
      constraints:
        - "동아일보 직영 운영 → 브랜드 완전 통제"
        - "어린이동아·동아닷컴 기존 채널로 홍보 가능 (추가 마케팅비 최소화)"
        - "월 1~2회 주말 운영 (평일 교육장 공실 활용)"
      partner: "동아이지에듀 (협력 운영), Filamentree (커리큘럼·강사)"
      funding: "유료 B2C — ₩200,000/팀, 추가 비용 없음"
      goal: "파일럿 1회 완료 → NPS 90%+ 달성 → 정기화 의사결정 데이터 확보"
    donga_strategic_value: |
      동아일보가 이미 보유한 공간·채널·브랜드만으로 신규 B2C 수익원을 테스트할 수 있다.
      추가 인력·예산 투입 없이 실행 가능한 가장 낮은 리스크의 파일럿.
      성공 시 '동아일보 AI Academy' 브랜드 서사의 앵커 레퍼런스가 된다.
      광고 수익 -11.3% YoY 상황에서 즉시 실행 가능한 다각화 카드.

  - case_id: C02
    name: "동아사이언스 과학동아AiR 연계 번들 워크숍"
    priority: 1
    context:
      venue: "동아사이언스 행사장 또는 동아미디어센터"
      participants: "과학동아AiR 구독 학생 + 학부모, 영재원/과학고 준비생 우선 모집"
      constraints:
        - "과학동아AiR(AI 모의면접 '소크라테스') 구독자가 이미 존재 — 0원 모집비"
        - "AiR Smart+ 번들(295,000원/년) 구독자 업셀링 구조"
        - "과기부 장관상 수상(2024.12) — 학부모 신뢰도 이미 높음"
        - "커리큘럼 일부를 '과학적 문제 설계 + AI 지휘'로 변형 (STEM 맥락)"
      partner: "동아사이언스, Filamentree"
      funding: "번들 업셀: AiR Smart+ 구독자 우선 할인가 ₩150,000/팀, 비구독자 ₩200,000/팀"
      goal: "AiR 구독 유지율 향상 + 워크숍 독립 수익 + 동아사이언스-동아일보 내부 시너지 실증"
    donga_strategic_value: |
      동아사이언스의 과학동아AiR와 Academy를 번들링하면 두 사업부 모두 KPI를 달성할 수 있다.
      AiR 구독자(서울과학고·아주대 영재교육원 수요 확약)는 고학력·고소득 학부모 집단 — 이탈률 낮고 입소문 전파력 높음.
      조선일보에 없는 '미디어사 × AI 과학교육' 내부 시너지를 선점하는 차별화 포인트.

  - case_id: C03
    name: "기업 임직원 자녀 CSR 워크숍 (B2B 기업연계)"
    priority: 1
    context:
      venue: "기업 연수원 또는 동아미디어센터 대관"
      participants: "대기업 임직원 자녀(초등~중등) + 동반 부모, 20~30팀/회"
      constraints:
        - "기업 CSR 예산으로 전액 집행 — 학부모 비용 부담 없음"
        - "DBR에듀 기존 기업 고객 네트워크 활용 (크로스셀 구조)"
        - "기업 로고 공동 브랜딩 허용 (조선일보 신한은행 멘토링캠프 모델 참조)"
        - "1회성 이벤트 → 연간 계약 전환 목표 (서비스 리테이너)"
      partner: "동아일보 DBR에듀 영업팀, 대기업 인사/CSR 부서"
      funding: "B2B 기업 CSR — ₩5,000,000~8,000,000/회 (30팀 기준)"
      goal: "DBR에듀 고객사 3곳 이상 파일럿 계약 → 연간 리테이너 전환"
    donga_strategic_value: |
      DBR에듀가 이미 보유한 대기업 관계망을 통해 고단가 B2B 채널을 즉시 개척할 수 있다.
      조선일보가 신한은행 임직원 자녀 멘토링캠프를 이미 운영 중 — 동아일보도 동일 모델 진입 가능.
      CSR 예산은 경기 불황에도 삭감률이 낮아 안정적인 수익원.
      동아일보가 기업 고객과의 관계를 '임원 교육(DBR에듀)'에서 '가족 교육'으로 확장하는 락인 전략.

  - case_id: C04
    name: "공교육 학교 방문 위탁 프로그램 (학교 제휴)"
    priority: 2
    context:
      venue: "서울·수도권 초등학교 및 중학교 컴퓨터실 또는 강당"
      participants: "학교 단체 — 학급 단위(25~30명) + 희망 학부모"
      constraints:
        - "학교장 재량 교육과정 또는 창의적 체험활동 시수 활용 (연간 34시간 SW교육 의무)"
        - "교육부 AI·디지털교과서 2026년 도입 → 학교 측 수요 폭발 직전"
        - "학교 예산(학교운영비 또는 교육청 지원금)으로 집행"
        - "4시간 → 2시간 압축 버전 운영 (학교 시간표 호환)"
        - "부모 참여는 선택 — 자녀 단독 참여 모드 추가 설계 필요"
      partner: "서울시교육청 또는 각 교육지원청, 동아이지에듀 (학교 채널)"
      funding: "학교운영비 ₩200,000~500,000/회 or 교육청 공모사업 연계"
      goal: "2026년 AI 디지털교과서 도입 전 레퍼런스 학교 10곳 확보"
    donga_strategic_value: |
      2026년 AI 디지털교과서 도입으로 학교-미디어사 파트너십 수요가 급증하는 타이밍.
      동아이지에듀가 기존에 보유한 학교 채널(신나는공부, 학생 대회)을 활용해 진입 비용 최소화.
      공교육 레퍼런스 확보 시 '동아일보 검증 AI 교육'이라는 신뢰 서사 형성 → B2C 전환 가속.
      조선일보가 아직 학교 AI 교육에 특화 프로그램 없음 — 선점 기회.

  - case_id: C05
    name: "미디어 프론티어 수료생 강사 양성 (강사 파이프라인)"
    priority: 2
    context:
      venue: "동아미디어센터 (교육 + TA 실습 병행)"
      participants: "미디어 프론티어 수료생(생성형 AI 콘텐츠 크리에이터 과정) 중 희망자"
      constraints:
        - "수료생은 동아일보 브랜드 교육 이력 보유 → 즉시 채용 가능"
        - "강사비 외 별도 채용비 없음 (기존 인재풀 활용)"
        - "수료생 입장에서 포트폴리오 추가 → 취업 경쟁력 향상 (win-win)"
        - "강사 양성 커리큘럼 2주 집중 과정 설계 필요"
        - "품질 편차 관리: Filamentree 마스터 강사가 인증 평가"
      partner: "동아일보 미래전략연구소 (미디어 프론티어 주관), Filamentree"
      funding: "미디어 프론티어 수료생 커뮤니티 활성화 예산(기존 국비 사업 잔여 활동비 활용 가능)"
      goal: "3기 수료생 중 강사 후보 5명 발굴 → Phase 2 지방 확산 시 강사 공급망 확보"
    donga_strategic_value: |
      미디어 프론티어 수료생을 Academy 강사로 연결하면 동아일보의 '국비교육 투자 → 취업 연계' KPI가 강화된다.
      강사 양성은 동아일보 입장에서 미디어 프론티어 사업의 성과 지표(취업률)를 개선하는 부수 효과.
      지방 확산 시 서울 집중 강사 의존 해소 → 사업 스케일업 병목 제거.

  - case_id: C06
    name: "어린이동아 구독자 멤버십 워크숍 (구독자 락인)"
    priority: 2
    context:
      venue: "동아미디어센터 또는 지역 거점 공간 (분기별 지방 순회)"
      participants: "어린이동아 유료 구독 가정 (59,000 유료부수 모수), 초등 4~6학년 + 부모"
      constraints:
        - "구독자에게 '구독 혜택'으로 제공 → 할인가 ₩100,000/팀 (비구독자 ₩200,000)"
        - "워크숍 경험이 구독 갱신 동기로 작동 (이탈 방어)"
        - "어린이동아 지면 + 앱 내 홍보 가능 — 추가 광고비 없음"
        - "워크숍 중 생성한 게임을 어린이동아 지면/온라인에 게재 가능 (콘텐츠 확보)"
      partner: "동아이지에듀 (어린이동아 운영팀)"
      funding: "구독자 혜택 비용은 마케팅 예산으로 처리 / 비구독자 정가 수익으로 상쇄"
      goal: "분기 1회 구독자 우선 오픈 → 갱신율 측정 → 구독 패키지 번들화 결정"
    donga_strategic_value: |
      어린이동아 구독부수가 8만부 → 5.9만부로 감소 추세 — 구독자 이탈 방어가 긴급 과제.
      워크숍을 '구독 특전'으로 포지셔닝하면 이탈 비용을 높이는 락인 메커니즘이 된다.
      동시에 워크숍 중 생산된 아이들의 게임·작품이 어린이동아의 독자 생성 콘텐츠로 활용 가능 — 편집부 부담 없이 콘텐츠 확보.

  - case_id: C07
    name: "에버랜드·롯데월드 체험형 팝업 워크숍 (위탁 운영)"
    priority: 2
    context:
      venue: "에버랜드, 롯데월드, 키자니아 등 체험 테마파크 내 교육존"
      participants: "테마파크 방문 가족 (현장 모집 + 사전 예약 혼합), 초등~중등"
      constraints:
        - "조선일보 에버랜드 위탁운영 선례 존재 → 동일 모델 적용 가능"
        - "4시간 → 90분 팝업 버전으로 압축 (핵심: Part 3 게임 제작만)"
        - "테마파크 측: 교육 콘텐츠 제공의 의무(교육부 인증 요건) 충족"
        - "동아일보 브랜드 노출 위치: 입장권·안내판·SNS 인증 이벤트"
        - "90분 버전 커리큘럼 별도 설계 필요"
      partner: "에버랜드(삼성물산) 또는 롯데월드 교육사업팀, Filamentree"
      funding: "테마파크 위탁 수수료 or 공동 수익 배분 (테마파크 ₩30~50% / 동아+Filamentree ₩50~70%)"
      goal: "연간 방문객 100만+ 테마파크에서 브랜드 노출 극대화 + 워크숍 참가자 B2C 풀타임 전환"
    donga_strategic_value: |
      조선일보가 에버랜드 위탁운영으로 이미 검증한 모델 — 동아일보에게 알려진 리스크.
      테마파크 채널은 마케팅 비용 없이 연간 수백만 가족에게 브랜드 노출.
      90분 체험판 → 풀타임 워크숍 전환 퍼널 구조로 B2C 신규 고객 획득 채널로 활용.
      동아일보 입장: 추가 투자 없이 오프라인 '미디어 접점' 확장.

  - case_id: C08
    name: "지자체 방과후 AI 교육 위탁 (정부보조금 연계)"
    priority: 2
    context:
      venue: "지자체 청소년 수련관, 도서관, 주민센터 교육실"
      participants: "지역 초등~중등 학생 + 희망 학부모, 10~15팀/회"
      constraints:
        - "지자체 방과후 프로그램 예산 활용 — 참가자 무료 또는 소액 부담"
        - "동아일보 미래전략연구소 '공익 교육' 프레임으로 접근 (미디어 프론티어 선례)"
        - "K-Digital Training 또는 교육부 AI교육 공모사업 연계 가능"
        - "지자체별 커스터마이징 최소화 — 표준 커리큘럼 유지"
        - "회당 Filamentree 강사 2인 + 지자체 보조 인력 1인 구조"
      partner: "서울시·경기도 자치구 교육문화과, 동아일보 지역 총국"
      funding: "지자체 교육 공모 예산 ₩3,000,000~5,000,000/회 (강사비 + 운영비)"
      goal: "2026 하반기 3개 자치구 시범 운영 → 내년 전국 확산 레퍼런스"
    donga_strategic_value: |
      미디어 프론티어로 구축한 '정부 보조금 연계 교육' 운영 경험을 K-12로 확장하는 자연스러운 경로.
      동아일보 지역 총국 네트워크가 지자체 접촉 채널 역할 — 별도 영업 인력 불필요.
      '공익 AI 교육'이라는 서사는 동아일보의 미디어 사회적 책임(MSR) KPI와 정렬되며 기사화 가능.

  - case_id: C09
    name: "IT 대기업 신입사원 자녀 온보딩 특별 워크숍 (B2B 프리미엄)"
    priority: 3
    context:
      venue: "기업 캠퍼스 내 교육센터 (삼성, 현대, SK 등)"
      participants: "IT 대기업 신입/경력 사원 자녀 (초등~중등) + 해당 부모, 10~20팀/회"
      constraints:
        - "입사 후 패밀리 데이·웰컴 패키지 일환으로 포지셔닝"
        - "AI 업계 부모 → 자녀의 AI 이해도 향상 니즈가 일반 학부모보다 강함"
        - "기업 HR 예산(복지 항목)으로 집행 — 교육 예산보다 집행 유연"
        - "당일 제작 게임을 기업 내부망에 게시하는 이벤트 연계 (기업 홍보 소재)"
        - "DBR에듀 법인 고객 중 IT 대기업 타겟 (기존 관계망 활용)"
      partner: "대기업 HR/복지팀, DBR에듀 B2B 영업팀"
      funding: "기업 복지 예산 — ₩8,000,000~12,000,000/회 (프리미엄 단가)"
    goal: "연 2~3개 대기업 파일럿 계약 → 연간 패밀리 데이 리테이너 전환"
    donga_strategic_value: |
      DBR에듀 고객사(임원 교육)에서 HR 부서로 확장하는 크로스셀 — 동일 기업 내 2개 부서 계약.
      IT 기업 임직원은 자녀의 AI 리터러시에 투자 의지가 가장 높은 집단.
      프리미엄 단가(회당 1천만원 이상)로 소수 계약으로도 높은 수익 — 운영 부담 대비 마진 최대.
      '삼성 임직원 자녀가 만든 게임' 같은 SNS 바이럴 소재 자동 생성.

  - case_id: C10
    name: "동아일보 에듀투어 패키지 연계 (해외 체험 + 국내 사전 워크숍)"
    priority: 3
    context:
      venue: "국내: 동아미디어센터 (출발 전 사전 워크숍) / 해외: 현지 교육기관"
      participants: "해외 교육여행 참가 가족 (초등~중등 + 부모), 10~15팀"
      constraints:
        - "조선일보 에듀투어(미국·독일·일본 해외교육여행) 모델 직접 참조"
        - "구조: 국내 AI 워크숍(4시간) → 해외 현지 STEM 방문 → 귀국 후 결과물 발표"
        - "해외 일정에서 만든 영감을 국내 AI 워크숍에서 구현하는 스토리라인"
        - "고가 패키지 (여행 + 교육 번들) → ₩500,000~1,000,000/팀 워크숍 단가 설정 가능"
        - "현재 동아일보 에듀투어 사업 운영 여부 확인 필요 (조선 선례 확인됨, 동아 미확인)"
      partner: "여행사 (하나투어 등), 해외 STEM 교육기관, 동아이지에듀"
      funding: "고단가 패키지 (여행비 포함 총 ₩3,000,000~5,000,000/팀)"
      goal: "연 2회 시범 패키지 출시 → 동아일보 에듀여행 신사업 검증"
    donga_strategic_value: |
      조선일보 에듀투어가 검증한 '언론사 브랜드 × 교육여행' 시장에서 AI 특화 포지션 선점.
      고단가 패키지로 워크숍 수익보다 높은 ARPU 달성 가능 — 소수 고객으로도 높은 절대 수익.
      어린이동아 독자 + 동아사이언스 구독자 중 고소득 가정 타겟 (기존 독자 고단가 전환).
      동아일보가 아직 에듀투어 운영 안 한다면 선점 기회 / 이미 한다면 AI 교육 레이어 추가로 차별화.
