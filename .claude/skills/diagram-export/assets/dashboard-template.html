<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --green:#7ee787; --orange:#f78166; --purple:#d2a8ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
  .header { background:linear-gradient(135deg,#1a1e2e,#0d1117); border-bottom:1px solid var(--border); padding:2rem; text-align:center; }
  .header h1 { font-size:1.8rem; } .header h1 span { color:var(--accent); }
  .header .sub { color:var(--muted); font-size:0.9rem; margin-top:0.25rem; }
  .stats { display:flex; justify-content:center; gap:2rem; margin-top:1rem; flex-wrap:wrap; }
  .stat-v { font-size:1.4rem; font-weight:700; color:var(--green); }
  .stat-l { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  .nav { display:flex; justify-content:center; gap:0.4rem; padding:0.8rem 1rem; border-bottom:1px solid var(--border); background:var(--card); flex-wrap:wrap; position:sticky; top:0; z-index:100; }
  .nav button { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.35rem 0.8rem; border-radius:6px; cursor:pointer; font-size:0.8rem; transition:all 0.2s; }
  .nav button:hover { border-color:var(--accent); color:var(--text); }
  .nav button.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
  .container { max-width:1400px; margin:0 auto; padding:1.5rem; }
  .section { display:none; animation:fadeIn 0.3s ease; } .section.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; }
  .card h2 { font-size:1.1rem; margin-bottom:0.2rem; display:flex; align-items:center; gap:0.5rem; }
  .card .desc { color:var(--muted); font-size:0.82rem; margin-bottom:1rem; }
  .badge { display:inline-block; font-size:0.65rem; padding:0.12rem 0.45rem; border-radius:10px; font-weight:600; text-transform:uppercase; }
  .badge-pass { background:rgba(126,231,135,0.15); color:var(--green); }
  .badge-fail { background:rgba(247,129,102,0.15); color:var(--orange); }
  .badge-flow { background:rgba(88,166,255,0.15); color:var(--accent); }
  .badge-gantt { background:rgba(126,231,135,0.15); color:var(--green); }
  .badge-pie { background:rgba(210,168,255,0.15); color:var(--purple); }
  .mermaid { display:flex; justify-content:center; overflow-x:auto; padding:0.5rem 0; }
  .mermaid svg { max-width:100%; height:auto; }
  .qa-table { width:100%; border-collapse:collapse; margin-top:1rem; font-size:0.85rem; }
  .qa-table th,.qa-table td { padding:0.5rem 0.75rem; border:1px solid var(--border); text-align:left; }
  .qa-table th { background:var(--bg); color:var(--muted); font-weight:600; }
  .footer { text-align:center; padding:1.5rem; color:var(--muted); font-size:0.75rem; border-top:1px solid var(--border); margin-top:2rem; }
</style>
</head>
<body>
<div class="header">
  <h1>{{TITLE}}</h1>
  <p class="sub">{{SUBTITLE}}</p>
  <div class="stats">
    <div><div class="stat-v">{{DIAGRAM_COUNT}}</div><div class="stat-l">Diagrams</div></div>
    <div><div class="stat-v">{{PASS_COUNT}}</div><div class="stat-l">QA Pass</div></div>
    <div><div class="stat-v">{{AVG_SCORE}}</div><div class="stat-l">Avg Score</div></div>
  </div>
</div>
<div class="nav" id="nav"><!-- tabs injected by JS --></div>
<div class="container" id="content"><!-- sections injected by JS --></div>
<div class="footer">Generated by diagram-export skill &middot; {{TIMESTAMP}}</div>
<script>
const THEME_CONFIG = {{THEME_CONFIG}};
mermaid.initialize({ startOnLoad:false, ...THEME_CONFIG });
const DIAGRAMS = {{DIAGRAMS_JSON}};
const QA = {{QA_JSON}};
const nav = document.getElementById('nav');
const content = document.getElementById('content');
// Build tabs and sections
DIAGRAMS.forEach((d,i) => {
  const btn = document.createElement('button');
  btn.textContent = d.label;
  btn.onclick = () => show(i);
  if(i===0) btn.classList.add('active');
  nav.appendChild(btn);

  const sec = document.createElement('div');
  sec.className = 'section' + (i===0?' active':'');
  sec.id = 'sec-'+i;
  const qa = QA[i] || {};
  const badge = qa.score >= 7 ? '<span class="badge badge-pass">PASS '+qa.score+'/10</span>' : qa.score ? '<span class="badge badge-fail">FAIL '+qa.score+'/10</span>' : '';
  const typeBadge = d.type === 'gantt' ? 'badge-gantt' : d.type === 'pie' ? 'badge-pie' : 'badge-flow';
  sec.innerHTML = '<div class="card"><h2>'+d.label+' <span class="badge '+typeBadge+'">'+d.type+'</span> '+badge+'</h2><p class="desc">'+d.desc+'</p><div class="mermaid">'+d.mmd+'</div></div>';
  content.appendChild(sec);
});
// QA summary tab
if(QA.length) {
  const btn = document.createElement('button');
  btn.textContent = 'QA Report';
  btn.onclick = () => show(DIAGRAMS.length);
  nav.appendChild(btn);
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = 'sec-'+DIAGRAMS.length;
  let rows = QA.map((q,i)=> '<tr><td>D-'+(i+1)+'</td><td>'+q.readability+'/10</td><td>'+q.completeness+'/10</td><td>'+q.layout+'/10</td><td><strong>'+q.score+'/10</strong></td><td>'+(q.issues||'None')+'</td></tr>').join('');
  sec.innerHTML = '<div class="card"><h2>QA Report</h2><table class="qa-table"><thead><tr><th>Diagram</th><th>Readability</th><th>Completeness</th><th>Layout</th><th>Overall</th><th>Issues</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  content.appendChild(sec);
}
function show(idx) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+idx).classList.add('active');
  nav.children[idx].classList.add('active');
  // render mermaid in newly shown section
  const el = document.getElementById('sec-'+idx);
  const mm = el.querySelectorAll('.mermaid:not([data-processed])');
  if(mm.length) mermaid.run({nodes:mm});
}
// Initial render
mermaid.run({nodes:document.querySelectorAll('.section.active .mermaid')});
</script>
</body>
</html>
